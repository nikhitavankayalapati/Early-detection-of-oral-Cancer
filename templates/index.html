<!DOCTYPE html>
<html>
<head>
    <title>Oral Cancer Detection</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
            padding: 30px;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }
        input, select {
            width: 90%;
            padding: 8px;
            margin: 8px 0;
        }
        button {
            background: #007BFF;
            color: white;
            padding: 10px;
            border: none;
            width: 95%;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        img {
            margin-top: 15px;
            border-radius: 10px;
        }
        .result {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Oral Cancer Detection</h2>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="POST" enctype="multipart/form-data">

        <input type="file" name="image" required><br>

        <input type="number" name="age" placeholder="Age" required><br>

        <select name="gender">
            <option value="M">Male</option>
            <option value="F">Female</option>
        </select><br>

        <select name="smoking">
            <option value="No">Smoking: No</option>
            <option value="Yes">Smoking: Yes</option>
        </select><br>

        <select name="chewing">
            <option value="No">Tobacco Chewing: No</option>
            <option value="Yes">Tobacco Chewing: Yes</option>
        </select><br>

        <select name="alcohol">
            <option value="No">Alcohol: No</option>
            <option value="Yes">Alcohol: Yes</option>
        </select><br>

        <button type="submit">Predict</button>
    </form>

    {% if result %}
        <div class="result">
            Result: {{ result }} <br>
            Confidence: {{ confidence }}%
        </div>
    {% endif %}

    {% if image_file %}
        <h3>Uploaded Image:</h3>
        <img src="{{ url_for('static', filename='uploads/' + image_file) }}" width="250">
    {% endif %}

</div>

</body>
</html>
